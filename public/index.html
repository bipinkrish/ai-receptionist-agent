<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solstice Pilates — Receptionist</title>
    <script id="app-config" type="application/json"><!--APP_CONFIG--></script>
    <script>
      (function () {
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = saved ?? (prefersDark ? "dark" : "light");
      })();
    </script>
    <style>
      :root,
      [data-theme="light"] {
        --bg-page: #f4f1ec;
        --bg-shell: #fff;
        --bg-header: #3d5a4c;
        --text-header: #fff;
        --text-primary: #2c2c2c;
        --text-muted: #6b7280;
        --bg-agent: #eef2ef;
        --bg-user: #3d5a4c;
        --text-user: #fff;
        --border: #eee;
        --input-border: #ddd;
        --input-bg: #fff;
        --input-text: #2c2c2c;
        --accent: #3d5a4c;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        --toggle-bg: rgba(255, 255, 255, 0.15);
        --card-bg: #eef2ef;
        --card-hover: #e2eae4;
        --card-icon: #3d5a4c;
      }

      [data-theme="dark"] {
        --bg-page: #1a1d1b;
        --bg-shell: #252926;
        --bg-header: #2d4036;
        --text-header: #e8ede9;
        --text-primary: #e8ede9;
        --text-muted: #9ca89f;
        --bg-agent: #323832;
        --bg-user: #4a7c62;
        --text-user: #fff;
        --border: #3a403c;
        --input-border: #454c48;
        --input-bg: #1e2220;
        --input-text: #e8ede9;
        --accent: #6ba888;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        --toggle-bg: rgba(0, 0, 0, 0.25);
        --card-bg: #323832;
        --card-hover: #3a403c;
        --card-icon: #6ba888;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg-page);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
      }

      .shell {
        width: 100%;
        max-width: 420px;
        background: var(--bg-shell);
        border-radius: 16px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        height: min(640px, 90vh);
        overflow: hidden;
      }

      header {
        padding: 16px 20px;
        background: var(--bg-header);
        color: var(--text-header);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        flex-shrink: 0;
      }

      header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
      header p { margin: 4px 0 0; font-size: 0.8rem; opacity: 0.85; }

      #theme-toggle {
        padding: 6px 10px;
        background: var(--toggle-bg);
        color: var(--text-header);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        font-size: 0.75rem;
        cursor: pointer;
      }

      .view {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
      }

      .hidden { display: none !important; }

      /* Home — two big mode blocks */
      #home-view {
        padding: 20px;
        gap: 16px;
      }

      .mode-card {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px;
        border: none;
        border-radius: 16px;
        background: var(--card-bg);
        color: var(--text-primary);
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        font-family: inherit;
        text-align: center;
      }

      .mode-card:hover {
        background: var(--card-hover);
        transform: translateY(-2px);
      }

      .mode-card:active { transform: translateY(0); }

      .mode-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--bg-user);
        color: var(--text-user);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }

      .mode-card h2 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
      }

      .mode-card p {
        margin: 0;
        font-size: 0.85rem;
        color: var(--text-muted);
        max-width: 220px;
        line-height: 1.4;
      }

      /* Text chat */
      #text-view .chat-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .msg {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 0.95rem;
        line-height: 1.45;
      }

      .msg.agent {
        align-self: flex-start;
        background: var(--bg-agent);
        border-bottom-left-radius: 4px;
      }

      .msg.user {
        align-self: flex-end;
        background: var(--bg-user);
        color: var(--text-user);
        border-bottom-right-radius: 4px;
      }

      .msg.status {
        align-self: flex-start;
        color: var(--text-muted);
        font-size: 0.8rem;
        font-style: italic;
        padding: 0 4px;
      }

      #text-view form {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      #text-view input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--input-border);
        background: var(--input-bg);
        color: var(--input-text);
        border-radius: 24px;
        font-size: 0.95rem;
        outline: none;
      }

      #text-view input:focus { border-color: var(--accent); }

      #text-view button[type="submit"] {
        padding: 10px 18px;
        background: var(--bg-user);
        color: var(--text-user);
        border: none;
        border-radius: 24px;
        font-weight: 600;
        cursor: pointer;
      }

      #text-view button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Voice */
      #voice-view {
        align-items: center;
        padding: 20px 24px 16px;
        text-align: center;
        gap: 12px;
      }

      .voice-top {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .voice-ring {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: var(--card-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        transition: box-shadow 0.3s;
      }

      .voice-ring.active {
        box-shadow: 0 0 0 6px var(--card-bg), 0 0 0 10px var(--accent);
      }

      #status {
        font-size: 0.85rem;
        color: var(--text-muted);
        min-height: 1.4em;
      }

      .voice-transcript {
        flex: 1;
        width: 100%;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-height: 0;
        padding: 4px 0;
      }

      .voice-transcript:empty::after {
        content: "Transcript will appear here during the call";
        color: var(--text-muted);
        font-size: 0.8rem;
        font-style: italic;
        margin-top: 24px;
      }

      .voice-transcript .msg {
        max-width: 85%;
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 0.85rem;
        line-height: 1.4;
        text-align: left;
      }

      .voice-transcript .msg.agent {
        align-self: flex-start;
        background: var(--bg-agent);
        border-bottom-left-radius: 4px;
      }

      .voice-transcript .msg.user {
        align-self: flex-end;
        background: var(--bg-user);
        color: var(--text-user);
        border-bottom-right-radius: 4px;
      }

      .voice-transcript .msg.partial {
        opacity: 0.6;
      }

      .voice-actions {
        display: flex;
        gap: 12px;
        width: 100%;
        max-width: 280px;
        flex-shrink: 0;
      }

      .voice-actions button {
        flex: 1;
        padding: 14px 20px;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      #start-call {
        background: var(--bg-user);
        color: var(--text-user);
      }

      #end-call {
        background: var(--card-bg);
        color: var(--text-primary);
      }

      .voice-actions button:disabled { opacity: 0.45; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <h1 id="header-title">Solstice Pilates</h1>
          <p id="header-sub">How would you like to connect?</p>
        </div>
        <button type="button" id="theme-toggle" aria-label="Toggle dark mode">Dark</button>
      </header>

      <div id="home-view" class="view">
        <button type="button" class="mode-card" id="pick-text">
          <div class="mode-icon">💬</div>
          <h2>Text</h2>
          <p>Type to book, reschedule, or ask about sessions</p>
        </button>
        <button type="button" class="mode-card" id="pick-voice">
          <div class="mode-icon">🎙️</div>
          <h2>Voice</h2>
          <p>Talk to our AI receptionist — mic required</p>
        </button>
      </div>

      <div id="text-view" class="view hidden">
        <div class="chat-body" id="messages"></div>
        <form id="form">
          <input id="input" type="text" placeholder="Type a message…" autocomplete="off" />
          <button type="submit" id="send">Send</button>
        </form>
      </div>

      <div id="voice-view" class="view hidden">
        <div class="voice-top">
          <div class="voice-ring" id="voice-ring">🎙️</div>
          <div id="status">Tap Start Call — allow mic when prompted</div>
        </div>
        <div class="voice-transcript" id="voice-transcript"></div>
        <div class="voice-actions">
          <button type="button" id="start-call">Start Call</button>
          <button type="button" id="end-call" disabled>End Call</button>
        </div>
      </div>
    </div>

    <script type="module">
      let cfg = { apiBase: "", vapiPublicKey: "", vapiAssistantId: "" };
      try {
        cfg = JSON.parse(document.getElementById("app-config").textContent);
      } catch {
        console.warn("app-config missing — run via npm run ui or GitHub Pages build");
      }
      const API_BASE = cfg.apiBase ?? "";
      const VAPI_PUBLIC_KEY = cfg.vapiPublicKey ?? "";
      const VAPI_ASSISTANT_ID = cfg.vapiAssistantId ?? "";

      const headerTitle = document.getElementById("header-title");
      const headerSub = document.getElementById("header-sub");
      const homeView = document.getElementById("home-view");
      const textView = document.getElementById("text-view");
      const voiceView = document.getElementById("voice-view");
      const messagesEl = document.getElementById("messages");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const statusEl = document.getElementById("status");
      const voiceRing = document.getElementById("voice-ring");
      const themeToggle = document.getElementById("theme-toggle");

      themeToggle.addEventListener("click", () => {
        const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = next;
        localStorage.setItem("theme", next);
        themeToggle.textContent = next === "dark" ? "Light" : "Dark";
      });
      themeToggle.textContent =
        document.documentElement.dataset.theme === "dark" ? "Light" : "Dark";

      function showView(view) {
        homeView.classList.add("hidden");
        textView.classList.add("hidden");
        voiceView.classList.add("hidden");
        view.classList.remove("hidden");
      }

      document.getElementById("pick-text").addEventListener("click", () => {
        headerTitle.textContent = "Text chat";
        headerSub.textContent = "Book · reschedule · cancel";
        showView(textView);
        if (!textStarted) startTextSession();
        input.focus();
      });

      document.getElementById("pick-voice").addEventListener("click", () => {
        headerTitle.textContent = "Voice call";
        headerSub.textContent = "Speak naturally — like a phone call";
        showView(voiceView);
      });

      let sessionId = null;
      let busy = false;
      let textStarted = false;

      function addMessage(text, role) {
        const el = document.createElement("div");
        el.className = `msg ${role}`;
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function startTextSession() {
        textStarted = true;
        const res = await fetch(`${API_BASE}/api/session`, { method: "POST" });
        const data = await res.json();
        sessionId = data.sessionId;
        addMessage(data.greeting, "agent");
      }

      async function sendMessage(text) {
        if (!text.trim() || busy) return;
        busy = true;
        sendBtn.disabled = true;
        input.disabled = true;
        addMessage(text, "user");
        input.value = "";

        try {
          const res = await fetch(`${API_BASE}/api/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId, message: text }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error ?? "Request failed");
          sessionId = data.sessionId;
          if (data.status) addMessage(data.status, "status");
          addMessage(data.reply, "agent");
        } catch (err) {
          addMessage("Sorry, something went wrong. Please try again.", "agent");
          console.error(err);
        } finally {
          busy = false;
          sendBtn.disabled = false;
          input.disabled = false;
          input.focus();
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        sendMessage(input.value);
      });

      let vapi = null;
      const startBtn = document.getElementById("start-call");
      const endBtn = document.getElementById("end-call");
      const transcriptEl = document.getElementById("voice-transcript");
      let partialBubble = null;

      function addTranscriptMsg(text, role, isPartial) {
        if (isPartial) {
          if (partialBubble && partialBubble.dataset.role === role) {
            partialBubble.textContent = text;
          } else {
            finalizePartial();
            partialBubble = document.createElement("div");
            partialBubble.className = `msg ${role === "user" ? "user" : "agent"} partial`;
            partialBubble.dataset.role = role;
            partialBubble.textContent = text;
            transcriptEl.appendChild(partialBubble);
          }
        } else {
          if (partialBubble && partialBubble.dataset.role === role) {
            partialBubble.textContent = text;
            partialBubble.classList.remove("partial");
            partialBubble = null;
          } else {
            finalizePartial();
            const el = document.createElement("div");
            el.className = `msg ${role === "user" ? "user" : "agent"}`;
            el.textContent = text;
            transcriptEl.appendChild(el);
          }
        }
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }

      function finalizePartial() {
        if (partialBubble) {
          partialBubble.classList.remove("partial");
          partialBubble = null;
        }
      }

      async function initVapi() {
        if (vapi) return vapi;
        if (!VAPI_PUBLIC_KEY || !VAPI_ASSISTANT_ID) {
          statusEl.textContent = "Voice not configured (missing Vapi keys)";
          return null;
        }

        const { default: Vapi } = await import("https://esm.sh/@vapi-ai/web@2.5.2");
        vapi = new Vapi(VAPI_PUBLIC_KEY);

        vapi.on("call-start", () => {
          statusEl.textContent = "Listening…";
          voiceRing.classList.add("active");
          startBtn.disabled = true;
          endBtn.disabled = false;
          transcriptEl.innerHTML = "";
          partialBubble = null;
        });

        vapi.on("call-end", () => {
          statusEl.textContent = "Call ended";
          voiceRing.classList.remove("active");
          startBtn.disabled = false;
          endBtn.disabled = true;
          finalizePartial();
        });

        vapi.on("speech-start", () => { statusEl.textContent = "Assistant speaking…"; });
        vapi.on("speech-end", () => { statusEl.textContent = "Listening…"; });

        vapi.on("message", (msg) => {
          if (msg.type === "transcript") {
            const role = msg.role === "assistant" ? "assistant" : "user";
            addTranscriptMsg(msg.transcript, role, msg.transcriptType === "partial");
          }
        });

        vapi.on("error", (err) => {
          console.error(err);
          statusEl.textContent = "Error — see console";
          voiceRing.classList.remove("active");
          startBtn.disabled = false;
          endBtn.disabled = true;
        });

        return vapi;
      }

      startBtn.addEventListener("click", async () => {
        statusEl.textContent = "Connecting…";
        const client = await initVapi();
        if (!client) return;
        try {
          await client.start(VAPI_ASSISTANT_ID);
        } catch (err) {
          console.error(err);
          statusEl.textContent = "Could not start call";
        }
      });

      endBtn.addEventListener("click", () => {
        if (vapi) vapi.stop();
      });
    </script>
  </body>
</html>
