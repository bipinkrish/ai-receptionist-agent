<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solstice Pilates — Receptionist</title>
    <script>
      window.__API_BASE__ = "__API_BASE_URL__";
      (function () {
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = saved ?? (prefersDark ? "dark" : "light");
      })();
    </script>
    <style>
      :root,
      [data-theme="light"] {
        --bg-page: #f4f1ec;
        --bg-shell: #fff;
        --bg-header: #3d5a4c;
        --text-header: #fff;
        --text-primary: #2c2c2c;
        --text-muted: #6b7280;
        --bg-agent: #eef2ef;
        --bg-user: #3d5a4c;
        --text-user: #fff;
        --border: #eee;
        --input-border: #ddd;
        --input-bg: #fff;
        --input-text: #2c2c2c;
        --accent: #3d5a4c;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        --toggle-bg: rgba(255, 255, 255, 0.15);
      }

      [data-theme="dark"] {
        --bg-page: #1a1d1b;
        --bg-shell: #252926;
        --bg-header: #2d4036;
        --text-header: #e8ede9;
        --text-primary: #e8ede9;
        --text-muted: #9ca89f;
        --bg-agent: #323832;
        --bg-user: #4a7c62;
        --text-user: #fff;
        --border: #3a403c;
        --input-border: #454c48;
        --input-bg: #1e2220;
        --input-text: #e8ede9;
        --accent: #6ba888;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        --toggle-bg: rgba(0, 0, 0, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg-page);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        transition: background 0.2s, color 0.2s;
      }

      .shell {
        width: 100%;
        max-width: 420px;
        background: var(--bg-shell);
        border-radius: 16px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        height: min(640px, 90vh);
        overflow: hidden;
        transition: background 0.2s, box-shadow 0.2s;
      }

      header {
        padding: 16px 20px;
        background: var(--bg-header);
        color: var(--text-header);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .header-text h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .header-text p {
        margin: 4px 0 0;
        font-size: 0.8rem;
        opacity: 0.85;
      }

      #theme-toggle {
        flex-shrink: 0;
        padding: 6px 10px;
        background: var(--toggle-bg);
        color: var(--text-header);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        font-size: 0.75rem;
        cursor: pointer;
        line-height: 1;
      }

      #theme-toggle:hover {
        opacity: 0.9;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .msg {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 0.95rem;
        line-height: 1.45;
      }

      .msg.agent {
        align-self: flex-start;
        background: var(--bg-agent);
        color: var(--text-primary);
        border-bottom-left-radius: 4px;
      }

      .msg.user {
        align-self: flex-end;
        background: var(--bg-user);
        color: var(--text-user);
        border-bottom-right-radius: 4px;
      }

      .msg.status {
        align-self: flex-start;
        background: transparent;
        color: var(--text-muted);
        font-size: 0.8rem;
        font-style: italic;
        padding: 0 4px;
      }

      form {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid var(--border);
      }

      input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--input-border);
        background: var(--input-bg);
        color: var(--input-text);
        border-radius: 24px;
        font-size: 0.95rem;
        outline: none;
      }

      input::placeholder {
        color: var(--text-muted);
      }

      input:focus {
        border-color: var(--accent);
      }

      button[type="submit"] {
        padding: 10px 18px;
        background: var(--bg-user);
        color: var(--text-user);
        border: none;
        border-radius: 24px;
        font-weight: 600;
        cursor: pointer;
      }

      button[type="submit"]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="header-text">
          <h1>Solstice Pilates</h1>
          <p>AI receptionist · book · reschedule · cancel</p>
        </div>
        <button type="button" id="theme-toggle" aria-label="Toggle dark mode">Dark</button>
      </header>
      <div id="messages"></div>
      <form id="form">
        <input id="input" type="text" placeholder="Type a message…" autocomplete="off" />
        <button type="submit" id="send">Send</button>
      </form>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const themeToggle = document.getElementById("theme-toggle");
      const API_BASE = window.__API_BASE__;

      let sessionId = null;
      let busy = false;

      function updateThemeButton() {
        const dark = document.documentElement.dataset.theme === "dark";
        themeToggle.textContent = dark ? "Light" : "Dark";
        themeToggle.setAttribute("aria-label", dark ? "Switch to light mode" : "Switch to dark mode");
      }

      themeToggle.addEventListener("click", () => {
        const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = next;
        localStorage.setItem("theme", next);
        updateThemeButton();
      });

      updateThemeButton();

      function addMessage(text, role) {
        const el = document.createElement("div");
        el.className = `msg ${role}`;
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return el;
      }

      async function startSession() {
        const res = await fetch(`${API_BASE}/api/session`, { method: "POST" });
        const data = await res.json();
        sessionId = data.sessionId;
        addMessage(data.greeting, "agent");
      }

      async function sendMessage(text) {
        if (!text.trim() || busy) return;
        busy = true;
        sendBtn.disabled = true;
        input.disabled = true;

        addMessage(text, "user");
        input.value = "";

        try {
          const res = await fetch(`${API_BASE}/api/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId, message: text }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error ?? "Request failed");

          sessionId = data.sessionId;
          if (data.status) addMessage(data.status, "status");
          addMessage(data.reply, "agent");
        } catch (err) {
          addMessage("Sorry, something went wrong. Please try again.", "agent");
          console.error(err);
        } finally {
          busy = false;
          sendBtn.disabled = false;
          input.disabled = false;
          input.focus();
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        sendMessage(input.value);
      });

      startSession().catch(console.error);
      input.focus();
    </script>
  </body>
</html>
